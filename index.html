<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abubakar Interstellar | Hyper-Realism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #loader {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; color: #00f2fe; transition: 1s;
        }
        #hud {
            position: fixed; top: 40px; left: 40px; color: white;
            border-left: 3px solid #00f2fe; padding-left: 20px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loader"><h1>INITIALIZING UNIVERSE...</h1></div>

    <div id="hud">
        <h1 style="margin:0; letter-spacing:5px;">ABUBAKAR</h1>
        <p style="margin:0; font-size:0.7rem; color:#00f2fe;">HYPER-REALISTIC SIMULATION v4.0</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, planets = [];
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 150, 400); // Cinematic Start Position

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. ASLI SPACE LIGHTING (The Secret Sauce)
            const sunLight = new THREE.PointLight(0xffffff, 3, 1000);
            scene.add(sunLight); // Sun is the only light source
            scene.add(new THREE.AmbientLight(0x111111)); // Deep space darkness

            // 2. STARFIELD (Nebula Effect)
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(15000 * 3);
            for(let i=0; i<45000; i++) starPos[i] = (Math.random() - 0.5) * 3000;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xaaaaaa, size: 0.7})));

            // 3. THE SUN (Volumetric Glow)
            const sunGeo = new THREE.SphereGeometry(25, 64, 64);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sun);

            // 4. PLANET FACTORY (Real 3D Shaders)
            const pSpecs = [
                {name: "Mercury", size: 3, dist: 70, speed: 0.01, color: 0x888888},
                {name: "Venus", size: 6, dist: 110, speed: 0.007, color: 0xe3bb76},
                {name: "Earth", size: 7, dist: 160, speed: 0.005, color: 0x2277ff},
                {name: "Mars", size: 5, dist: 210, speed: 0.004, color: 0xff4400},
                {name: "Jupiter", size: 18, dist: 300, speed: 0.002, color: 0xd39c7e}
            ];

            pSpecs.forEach(spec => {
                const group = new THREE.Group();
                const geo = new THREE.SphereGeometry(spec.size, 64, 64);
                // StandardMaterial uses Light to create Shadows (Realism)
                const mat = new THREE.MeshStandardMaterial({ 
                    color: spec.color,
                    roughness: 0.7,
                    metalness: 0.2
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.x = spec.dist;
                group.add(mesh);
                group.userData = { speed: spec.speed };
                planets.push(group);
                scene.add(group);

                // Subtle Orbit Path
                const orbitGeo = new THREE.RingGeometry(spec.dist, spec.dist + 0.5, 128);
                const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.05 });
                const orbit = new THREE.Mesh(orbitGeo, orbitMat);
                orbit.rotation.x = Math.PI/2;
                scene.add(orbit);
            });

            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; }, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            planets.forEach(p => {
                p.rotation.y += p.userData.speed;
                p.children[0].rotation.y += 0.01; // Planet self-rotation
            });

            // Smooth Camera Entry
            if(camera.position.y > 80) {
                camera.position.y -= 0.5;
                camera.position.z -= 0.8;
            }

            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
