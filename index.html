<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margarita Style Effect</title>
    <style>
        /* 1. Google Font Jo Usne Use Kiya */
        @import url("https://fonts.googleapis.com/css2?family=Unbounded:wght@900&display=swap");

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Unbounded', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Background Video (Apple Park Style) */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.6);
        }

        /* 3. Aurora Blur Effect (Jo Reel Mein Color Clouds Hain) */
        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
            mix-blend-mode: overlay;
        }

        .blob {
            position: absolute;
            width: 50vw;
            height: 50vh;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #f093fb);
            border-radius: 50%;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(60%, 40%); }
        }

        /* 4. Glitch Text Effect */
        .glitch-text {
            font-size: 8vw;
            color: white;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), 
                         -0.025em -0.05em 0 rgba(0,255,0,.75), 
                         0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(0,255,0,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(0,0,255,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75); }
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.codepen.io/3364143/720p.mp4" type="video/mp4">
    </video>

    <div class="aurora">
        <div class="blob"></div>
    </div>

    <h1 class="glitch-text">ABUBAKAR</h1>

</body>
</html>
