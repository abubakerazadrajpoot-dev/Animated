<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABUBAKAR | THE INFINITY FLOW</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap');

        body { margin: 0; background: #000; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* Ultra Professional UI */
        #ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 50px; box-sizing: border-box;
        }

        .header { border-left: 2px solid #fff; padding-left: 20px; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #fff; letter-spacing: 12px; }
        .tagline { color: rgba(255,255,255,0.4); letter-spacing: 5px; font-size: 0.7rem; margin-top: 10px; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; color: #fff; }
        .data { font-family: monospace; font-size: 0.6rem; opacity: 0.5; line-height: 2; }
        .status { font-weight: bold; letter-spacing: 2px; border: 1px solid #fff; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; }

        /* Subtle Grain Effect for Realism */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="ui">
        <div class="header">
            <div class="logo">ABUBAKAR</div>
            <div class="tagline">BEYOND VISUAL LIMITS // NO-PLANET SECTOR</div>
        </div>

        <div class="footer">
            <div class="data">
                SYSTEM_MODE: ABSTRACT_FLOW<br>
                RENDER_ENGINE: WEBGL_2.0<br>
                AUTH: ABUBAKAR_KHAN
            </div>
            <div class="status">LIMITLESS ARCHITECTURE</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, object;
        let clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Create a complex "Icosahedron" but with high detail for a "liquid" look
            const geometry = new THREE.IcosahedronGeometry(1.5, 15); 
            
            // This is the Magic: MeshNormalMaterial looks like moving liquid silver/chrome
            const material = new THREE.MeshNormalMaterial({ 
                wireframe: false,
                flatShading: false
            });

            object = new THREE.Mesh(geometry, material);
            scene.add(object);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // PHYSICS: This makes the object "Morph" like liquid
            const position = object.geometry.attributes.position;
            const vector = new THREE.Vector3();

            for (let i = 0; i < position.count; i++) {
                vector.fromBufferAttribute(position, i);
                
                // Sin/Cos waves to create liquid ripple effect
                const wave = Math.sin(vector.x * 2 + time) * 0.1 + 
                             Math.cos(vector.y * 2 + time) * 0.1 +
                             Math.sin(vector.z * 2 + time) * 0.1;
                
                vector.normalize().multiplyScalar(1.5 + wave);
                position.setXYZ(i, vector.x, vector.y, vector.z);
            }
            position.needsUpdate = true;

            object.rotation.y = time * 0.2;
            object.rotation.x = time * 0.1;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
