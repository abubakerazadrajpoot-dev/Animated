<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Style Masterpiece | Abubakar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }

        /* VIP Loading Screen */
        #loader {
            position: fixed; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; color: #00f2fe;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top-color: #00f2fe; border-radius: 50%;
            animation: spin 1s infinite linear; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HUD UI */
        #hud {
            position: fixed; top: 30px; left: 30px;
            color: white; pointer-events: none;
            border-left: 3px solid #00f2fe; padding-left: 15px;
        }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; }
        .status { font-size: 0.7rem; color: #00f2fe; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>SYNCHRONIZING WITH SATELLITE...</p>
    </div>

    <div id="hud">
        <h1>Cosmos v1.0</h1>
        <p class="status">SYSTEM READY | EXPLORER: ABUBAKAR</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, planets = [];
        const loader = new THREE.TextureLoader();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 60, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Lighting (Sun as Light Source)
            const sunLight = new THREE.PointLight(0xffffff, 2, 500);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0x333333));

            // 2. Stars (Deep Space)
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(15000 * 3);
            for(let i=0; i<45000; i++) starPos[i] = (Math.random() - 0.5) * 2000;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.7})));

            // 3. The Sun (The Heart)
            const sunGeo = new THREE.SphereGeometry(8, 64, 64);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sun);

            // 4. Planet Factory (Real Textures + Realistic Speed)
            const planetConfigs = [
                {name: "Mercury", size: 0.8, dist: 20, speed: 0.008, color: 0x888888, tex: 'https://threejs.org/examples/textures/planets/mercurymap.jpg'},
                {name: "Venus", size: 1.8, dist: 35, speed: 0.005, color: 0xe3bb76, tex: 'https://threejs.org/examples/textures/planets/venusmap.jpg'},
                {name: "Earth", size: 2, dist: 55, speed: 0.003, color: 0x2277ff, tex: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'},
                {name: "Mars", size: 1.2, dist: 75, speed: 0.002, color: 0xff4422, tex: 'https://threejs.org/examples/textures/planets/marsmap1k.jpg'},
                {name: "Jupiter", size: 5, dist: 110, speed: 0.001, color: 0xd39c7e, tex: 'https://threejs.org/examples/textures/planets/jupitermap.jpg'},
                {name: "Saturn", size: 4.2, dist: 150, speed: 0.0007, color: 0xc5ab6e, tex: 'https://threejs.org/examples/textures/planets/saturnmap.jpg'}
            ];

            planetConfigs.forEach(data => {
                const group = new THREE.Group(); // Planet and its orbit container
                const geo = new THREE.SphereGeometry(data.size, 64, 64);
                const mat = new THREE.MeshStandardMaterial({ color: data.color, map: loader.load(data.tex) });
                const mesh = new THREE.Mesh(geo, mat);
                
                // Add orbit line
                const orbitGeo = new THREE.RingGeometry(data.dist, data.dist + 0.1, 128);
                const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
                const orbit = new THREE.Mesh(orbitGeo, orbitMat);
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);

                mesh.position.x = data.dist;
                group.userData = { speed: data.speed, angle: Math.random() * Math.PI * 2 };
                group.add(mesh);
                planets.push(group);
                scene.add(group);
            });

            // Remove Loader
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; 
            setTimeout(() => { document.getElementById('loader').remove(); }, 1000); }, 3000);
        }

        function animate() {
            requestAnimationFrame(animate);
            planets.forEach(p => {
                p.userData.angle += p.userData.speed;
                p.children[0].position.x = Math.cos(p.userData.angle) * p.children[0].parent.children[0].position.x; // Static fix
                // Correct movement logic
                const dist = p.children[0].position.length(); // Initial distance
                p.children[0].position.x = Math.cos(p.userData.angle) * p.children[1] ? 0 : 0; // Resetting for logic
                // Simple logic for stable orbits:
                const d = p.children[0].parent.children[0].userData ? 0 : 0; // placeholder
            });

            // Better Animation Loop
            planets.forEach((p, i) => {
                p.rotation.y += p.userData.speed;
            });

            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }

        // Fixed Animation
        let renderLoop = () => {
            requestAnimationFrame(renderLoop);
            planets.forEach(p => {
                p.rotation.y += p.userData.speed;
                p.children[0].rotation.y += 0.01;
            });
            renderer.render(scene, camera);
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        renderLoop();
    </script>
</body>
</html>
