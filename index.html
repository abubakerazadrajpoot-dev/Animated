<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABUBAKAR | PREVIEW ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600&display=swap');

        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

        /* UI Overlay Layer */
        #main-ui {
            position: relative; z-index: 10; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; letter-spacing: 5px; color: #00f2fe; }

        /* Service Cards Grid (Based on your Screenshot) */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px; width: 100%; max-width: 900px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 12px; padding: 20px; text-align: center;
            backdrop-filter: blur(10px); transition: 0.3s;
        }

        .card:hover { border-color: #00f2fe; transform: translateY(-5px); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .card h3 { font-size: 0.9rem; letter-spacing: 1px; margin: 10px 0; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { 
            font-size: 0.6rem; padding: 5px 12px; border-radius: 20px; 
            cursor: pointer; border: 1px solid #00f2fe; background: transparent; color: #00f2fe;
        }
        .btn.active { background: #00f2fe; color: #000; font-weight: bold; }

        /* The 3D Focus Area */
        #cube-container { height: 300px; width: 100%; display: flex; justify-content: center; align-items: center; margin: 40px 0; }

        .login-box {
            background: rgba(0,0,0,0.8); border: 1px solid #00f2fe;
            padding: 20px; border-radius: 10px; width: 300px; text-align: center;
        }
        input { 
            width: 80%; background: #111; border: 1px solid #333; 
            padding: 8px; margin: 5px 0; color: #fff; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header">
            <div class="logo">ABUBAKAR</div>
            <div style="font-size: 0.7rem; color: #00f2fe;">V7.4 // SYSTEM_ACTIVE</div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Social Media</h3>
                <div class="btn-group">
                    <button class="btn active">Use Now</button>
                    <button class="btn">Download</button>
                </div>
            </div>
            <div class="card">
                <h3>Color Palette</h3>
                <div class="btn-group">
                    <button class="btn active">Use Now</button>
                    <button class="btn">Download</button>
                </div>
            </div>
            <div class="card">
                <h3>Google Fonts</h3>
                <div class="btn-group">
                    <button class="btn active">Use Now</button>
                    <button class="btn">Download</button>
                </div>
            </div>
            <div class="card">
                <h3>Poster Maker</h3>
                <div class="btn-group">
                    <button class="btn active">Use Now</button>
                    <button class="btn">Download</button>
                </div>
            </div>
        </div>

        <div id="cube-container"></div>

        <div class="login-box">
            <div style="color: #00f2fe; margin-bottom: 10px;">AUTH LOGIN</div>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <div class="btn-group">
                <button class="btn active" style="width: 100px;">LOGIN</button>
                <button class="btn" style="width: 100px;">SIGN UP</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, cube, particles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. BLACK 3D GLASS CUBE (Your Request)
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x000000, 
                shininess: 100,
                specular: 0x00f2fe,
                transparent: true,
                opacity: 0.9,
                wireframe: true // To make it look "Zabardast" like your screenshot
            });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // 2. STARFIELD (Bottom/Background Part)
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 3000;
            const pos = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) pos[i] = (Math.random() - 0.5) * 20;
            pGeometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const pMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0x00f2fe });
            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            // Light to make the Black Cube visible
            const light = new THREE.PointLight(0x00f2fe, 1, 100);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x444444));
        }

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
