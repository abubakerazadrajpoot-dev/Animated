<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABUBAKAR | NEURAL CORE Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { margin: 0; background-color: #030303; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Professional UI Overlay */
        #ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 60px; box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.9) 100%);
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 2.5rem; color: #fff; letter-spacing: 15px; text-shadow: 0 0 20px rgba(0, 100, 255, 0.4); }
        .tagline { color: rgba(255,255,255,0.6); letter-spacing: 4px; font-weight: 300; font-size: 0.8rem; text-transform: uppercase; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; color: rgba(255,255,255,0.3); }
        .stats { font-family: monospace; font-size: 0.7rem; line-height: 1.8; text-transform: uppercase; border-left: 2px solid #00f2fe; padding-left: 20px; }
        .accent { color: #00f2fe; font-weight: bold; }

        #boot-sequence {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; flex-direction: column; transition: 1.5s ease-in-out;
            font-family: monospace; color: #00f2fe; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="boot-sequence">
        <div style="font-size: 1.5rem; font-weight: bold;"></div>
        <div style="font-size: 0.8rem; margin-top: 20px;">CALIBRATING NEURAL NETWORK...</div>
    </div>

    <div id="ui">
        <div class="header">
            <div class="logo">ABUBAKAR</div>
            <div class="tagline">Neural Architecture Engine v1.0</div>
        </div>

        <div class="footer">
            <div class="stats">
                CORE: <span class="accent">STABLE</span><br>
                PHYSICS SYNC: <span class="accent">ACTIVE</span><br>
                MODEL: CRYSTAL_MESH_77
            </div>
            <div style="text-align: right;">
                <p style="font-size: 1.4rem; margin: 0; color: #fff; letter-spacing: 2px; font-weight: 700;">LIMITLESS</p>
                <p style="font-size: 0.7rem; letter-spacing: 2px;">DEEP LEARNING SYNTHESIS</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, particles, crystal;
        let clock;
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // 1. NEURAL CRYSTAL (Core 3D Object - Hyper-Realistic Material)
            const geometry = new THREE.IcosahedronGeometry(4, 2); // Glass Structure
            
            // StandardMaterial uses Light to create Shadows (Realism)
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00f2fe, 
                wireframe: true,
                transparent: true,
                opacity: 0.6,
                roughness: 0.3,
                metalness: 0.8
            });

            crystal = new THREE.Mesh(geometry, material);
            scene.add(crystal);

            // 2. PARTICLE CLOUD (Depth)
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 2000;
            const posArray = new Float32Array(pCount * 3);

            for(let i=0; i < pCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 30;

            pGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const pMaterial = new THREE.PointsMaterial({
                size: 0.005,
                color: 0xffffff,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            // 3. Realistic Lighting (The Secret)
            const sunLight = new THREE.PointLight(0xffffff, 2.5, 500);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0x222222));

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Morphing Physics
            crystal.rotation.x = time * 0.15;
            crystal.rotation.y = time * 0.1;
            crystal.scale.setScalar(1 + Math.sin(time) * 0.05); // Pulsing effect

            // Particle Movement
            particles.rotation.y += 0.001;

            // Smooth Camera Entry (Cinematic)
            if (camera.position.z > 8.5) {
                camera.position.z -= 0.005;
            }

            // Mouse Interaction (Tilt)
            if (mouseX > 0) {
                const targetX = (mouseX - window.innerWidth / 2) * 0.0001;
                const targetY = (mouseY - window.innerHeight / 2) * 0.0001;
                crystal.rotation.y += targetX;
                crystal.rotation.x += targetY;
            }

            renderer.render(scene, camera);
        }

        // Boot sequence
        window.addEventListener('load', () => {
            init();
            setTimeout(() => {
                document.getElementById('boot-sequence').style.opacity = '0';
                setTimeout(() => document.getElementById('boot-sequence').remove(), 1500);
            }, 2000);
            animate();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
