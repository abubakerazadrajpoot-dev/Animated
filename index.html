<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABUBAKAR | BEYOND LIMITS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap');

        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* UI Layer - Pure Professionalism */
        #ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 60px; box-sizing: border-box;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; }
        .brand { font-family: 'Syncopate', sans-serif; font-size: 2.2rem; letter-spacing: 12px; color: #fff; text-shadow: 0 0 30px rgba(0, 255, 150, 0.5); }
        .version { color: #00ff96; font-size: 0.7rem; letter-spacing: 4px; font-weight: bold; border: 1px solid #00ff96; padding: 4px 10px; border-radius: 4px; }

        .center-text { text-align: center; color: rgba(255,255,255,0.1); font-size: 10vw; font-weight: 900; pointer-events: none; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .data-panel { border-left: 2px solid #00ff96; padding-left: 20px; color: #00ff96; font-size: 0.6rem; letter-spacing: 2px; line-height: 1.8; }
        .social { color: #fff; font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="top-nav">
            <div class="brand">ABUBAKAR</div>
            <div class="version">CORE v10.4</div>
        </div>

        <div class="center-text">PROTO-CORE</div>

        <div class="footer">
            <div class="data-panel">
                X-COORD: <span id="x-val">0.00</span><br>
                Y-COORD: <span id="y-val">0.00</span><br>
                SYSTEM: ENCRYPTED // MASTERPIECE MODE
            </div>
            <div class="social">BEYOND IMAGINATION</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, mesh, clock;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // The Masterpiece Geometry: Hyper-Torus Knot
            const geometry = new THREE.TorusKnotGeometry(1, 0.3, 200, 32);
            
            // Custom Shader-like Material (Liquid Neon)
            const material = new THREE.MeshNormalMaterial({ 
                wireframe: true,
                transparent: true,
                opacity: 0.9
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Background Particles
            const pGeo = new THREE.BufferGeometry();
            const pCount = 3000;
            const pos = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) pos[i] = (Math.random() - 0.5) * 10;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const pMat = new THREE.PointsMaterial({ size: 0.005, color: 0x00ff96 });
            scene.add(new THREE.Points(pGeo, pMat));
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Morphing Animation
            mesh.rotation.x = time * 0.4;
            mesh.rotation.y = time * 0.2;
            mesh.scale.setScalar(1 + Math.sin(time) * 0.1);

            renderer.render(scene, camera);
        }

        // Mouse Tracker for UI
        window.addEventListener('mousemove', (e) => {
            document.getElementById('x-val').innerText = (e.clientX / 100).toFixed(2);
            document.getElementById('y-val').innerText = (e.clientY / 100).toFixed(2);
            
            // Tilt Effect
            const x = (e.clientX / window.innerWidth - 0.5) * 1.5;
            const y = (e.clientY / window.innerHeight - 0.5) * 1.5;
            mesh.rotation.x += y * 0.05;
            mesh.rotation.y += x * 0.05;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
