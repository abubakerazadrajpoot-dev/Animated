<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABUBAKAR | 3D CORE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        
        /* Heading on top */
        #title {
            position: absolute; top: 40px; width: 100%; text-align: center;
            color: #00f2fe; font-family: sans-serif; letter-spacing: 10px;
            font-weight: bold; font-size: 1.5rem; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="title">ABUBAKAR</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, cube, stars;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. ASLI 3D BOX (As requested)
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00f2fe, 
                wireframe: true, // Futuristic look
                transparent: true,
                opacity: 0.8
            });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // 2. CLEAN STARFIELD BACKGROUND
            const sGeo = new THREE.BufferGeometry();
            const sCount = 1500;
            const sPos = new Float32Array(sCount * 3);
            for(let i=0; i<sCount*3; i++) sPos[i] = (Math.random() - 0.5) * 20;
            sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
            const sMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff });
            stars = new THREE.Points(sGeo, sMat);
            scene.add(stars);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Smooth Rotation
            cube.rotation.x += 0.005;
            cube.rotation.y += 0.01;
            stars.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
