<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Earth Masterpiece | Abubakar</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }

        /* Overlay Text */
        .ui-container {
            position: absolute;
            top: 50%;
            left: 5%;
            transform: translateY(-50%);
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 10px;
        }

        p { font-size: 1.2rem; opacity: 0.7; letter-spacing: 2px; }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: 1px solid #4facfe;
            background: transparent;
            color: white;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background: #4facfe; color: black; box-shadow: 0 0 20px #4facfe; }

        /* Loading Screen */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="loader">Initializing Masterpiece...</div>

    <div class="ui-container">
        <p>EXPLORE THE DIGITAL</p>
        <h1>EARTH</h1>
        <p>Created by Abubakar | 3D Interactive Experience</p>
        <button class="btn">Start Mission</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, earth, clouds, stars;

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. Earth Geometry & Texture
            const loader = new THREE.TextureLoader();
            
            // High Quality Textures
            const earthTexture = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
            const earthNormal = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
            const earthSpecular = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');

            const earthGeo = new THREE.SphereGeometry(1, 64, 64);
            const earthMat = new THREE.MeshPhongMaterial({
                map: earthTexture,
                normalMap: earthNormal,
                specularMap: earthSpecular,
                shininess: 5
            });
            earth = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earth);

            // 3. Clouds Layer
            const cloudGeo = new THREE.SphereGeometry(1.01, 64, 64);
            const cloudMat = new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true,
                opacity: 0.8
            });
            clouds = new THREE.Mesh(cloudGeo, cloudMat);
            scene.add(clouds);

            // 4. Stars (Background)
            const starGeo = new THREE.BufferGeometry();
            const starCount = 5000;
            const starPos = new Float32Array(starCount * 3);
            for(let i=0; i<starCount*3; i++) {
                starPos[i] = (Math.random() - 0.5) * 100;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // 5. Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1);
            sunLight.position.set(5, 3, 5);
            scene.add(sunLight);

            document.getElementById('loader').style.display = 'none';
        }

        // Mouse Interactivity
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 1000;
            mouseY = (e.clientY - window.innerHeight / 2) / 1000;
        });

        function animate() {
            requestAnimationFrame(animate);

            earth.rotation.y += 0.002;
            clouds.rotation.y += 0.003;
            
            // Subtle tilt based on mouse
            earth.rotation.x += (mouseY - earth.rotation.x) * 0.05;
            earth.rotation.y += (mouseX - earth.rotation.y) * 0.05;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
