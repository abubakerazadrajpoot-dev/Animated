<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterpiece V2 | Abubakar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }

        #hud {
            position: fixed; top: 30px; left: 30px;
            color: white; pointer-events: none;
            border-left: 3px solid #00f2fe; padding-left: 15px;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; }
        .status { font-size: 0.6rem; color: #00f2fe; }
    </style>
</head>
<body>

    <div id="hud">
        <h1>COSMOS V2.0</h1>
        <p class="status">SYSTEM ONLINE | EXPLORER: ABUBAKAR</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, planets = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 80, 180);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Suraj (The Sun) - Asli Glow ke saath
            const sunGeo = new THREE.SphereGeometry(10, 64, 64);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sun);

            // 2. Stars Background (Ye black screen khatam karega)
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(8000 * 3);
            for(let i=0; i<24000; i++) starPos[i] = (Math.random() - 0.5) * 1500;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.8});
            scene.add(new THREE.Points(starGeo, starMat));

            // 3. Planets (Colors aur Orbits ke saath)
            const pConfigs = [
                {name: "Mercury", size: 1.2, dist: 30, speed: 0.02, color: 0x999999},
                {name: "Venus", size: 2.5, dist: 50, speed: 0.015, color: 0xffcc33},
                {name: "Earth", size: 2.8, dist: 75, speed: 0.01, color: 0x0077ff},
                {name: "Mars", size: 1.8, dist: 95, speed: 0.008, color: 0xff4400},
                {name: "Jupiter", size: 6, dist: 130, speed: 0.005, color: 0xffa500},
                {name: "Saturn", size: 5, dist: 170, speed: 0.003, color: 0xdfd8d0}
            ];

            pConfigs.forEach(data => {
                const pGroup = new THREE.Group();
                const geo = new THREE.SphereGeometry(data.size, 32, 32);
                const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.5, metalness: 0.5 });
                const mesh = new THREE.Mesh(geo, mat);
                
                mesh.position.x = data.dist;
                pGroup.add(mesh);
                pGroup.userData = { speed: data.speed };
                planets.push(pGroup);
                scene.add(pGroup);

                // Safaid Orbit Line
                const ringGeo = new THREE.RingGeometry(data.dist - 0.2, data.dist + 0.2, 128);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                scene.add(ring);
            });

            // Lighting
            const light = new THREE.PointLight(0xffffff, 2.5, 500);
            light.position.set(0, 0, 0);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x444444));
        }

        function animate() {
            requestAnimationFrame(animate);
            planets.forEach(p => {
                p.rotation.y += p.userData.speed;
                p.children[0].rotation.y += 0.02; // Planet khud bhi ghoome
            });
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
