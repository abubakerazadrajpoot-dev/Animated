<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Solar System | Masterpiece by Abubakar</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: fixed; top: 20px; left: 20px; color: white;
            pointer-events: none; text-shadow: 2px 2px 10px #000;
        }
        h1 { margin: 0; letter-spacing: 5px; font-weight: 300; font-size: 2rem; }
        .hint { font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>COSMOS EXPLORER</h1>
        <p class="hint">CLICK ANY PLANET TO APPROACH | SCROLL TO ZOOM</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, raycaster, mouse;
        let planets = [];
        let targetPos = new THREE.Vector3(0, 20, 50);

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 30, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // 1. Realistic Sun (Glow effect)
            const loader = new THREE.TextureLoader();
            const sunGeo = new THREE.SphereGeometry(5, 64, 64);
            const sunMat = new THREE.MeshBasicMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'), // Placeholder for Sun
                color: 0xffcc00
            });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sun);

            // 2. Stars (Deep Space)
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(10000 * 3);
            for(let i=0; i<30000; i++) starPos[i] = (Math.random() - 0.5) * 1500;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.5})));

            // 3. Create Real Planets
            // Data: Name, Radius, Distance, Speed, Texture
            const pData = [
                {name: "Mercury", r: 0.5, d: 15, s: 0.004, tex: 'https://threejs.org/examples/textures/planets/mercurymap.jpg'},
                {name: "Venus", r: 0.9, d: 22, s: 0.002, tex: 'https://threejs.org/examples/textures/planets/venusmap.jpg'},
                {name: "Earth", r: 1, d: 30, s: 0.0015, tex: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'},
                {name: "Mars", r: 0.7, d: 38, s: 0.0012, tex: 'https://threejs.org/examples/textures/planets/marsmap1k.jpg'},
                {name: "Jupiter", r: 2.5, d: 55, s: 0.0006, tex: 'https://threejs.org/examples/textures/planets/jupitermap.jpg'},
                {name: "Saturn", r: 2.1, d: 75, s: 0.0004, tex: 'https://threejs.org/examples/textures/planets/saturnmap.jpg'}
            ];

            pData.forEach(data => {
                const geo = new THREE.SphereGeometry(data.r, 64, 64);
                const mat = new THREE.MeshStandardMaterial({ map: loader.load(data.tex) });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.userData = { distance: data.d, speed: data.s, angle: Math.random() * Math.PI * 2 };
                planets.push(mesh);
                scene.add(mesh);
            });

            // Lighting
            const pointLight = new THREE.PointLight(0xffffff, 2, 300);
            scene.add(pointLight); // Sun ki light
            scene.add(new THREE.AmbientLight(0x222222));

            window.addEventListener('mousedown', onClick);
        }

        function onClick(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(planets);
            if(hits.length > 0) {
                const p = hits[0].object;
                targetPos.set(p.position.x, p.position.y + 2, p.position.z + 5);
            } else {
                targetPos.set(0, 30, 80); // Reset camera
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            planets.forEach(p => {
                p.userData.angle += p.userData.speed;
                p.position.x = Math.cos(p.userData.angle) * p.userData.distance;
                p.position.z = Math.sin(p.userData.angle) * p.userData.distance;
                p.rotation.y += 0.01;
            });

            camera.position.lerp(targetPos, 0.03);
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }

        init(); animate();
    </script>
</body>
</html>
