<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Masterpiece | Abubakar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        canvas { display: block; }

        /* Planet Info Panel */
        #info-panel {
            position: fixed;
            right: -400px; top: 0;
            width: 350px; height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-left: 2px solid #00f2fe;
            padding: 40px;
            transition: 0.5s;
            z-index: 100;
        }
        #info-panel.active { right: 0; }

        h1 { color: #00f2fe; text-transform: uppercase; letter-spacing: 5px; }
        p { line-height: 1.6; opacity: 0.8; }
        .close-btn { color: #ff0055; cursor: pointer; font-weight: bold; margin-bottom: 20px; display: block; }

        /* Instructions */
        .hint {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            opacity: 0.5; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <span class="close-btn" onclick="closePanel()">[ CLOSE ]</span>
        <h1 id="p-name">Planet Name</h1>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <p id="p-desc">Click a planet to see its secrets.</p>
    </div>

    <div class="hint">CLICK ON A PLANET TO EXPLORE</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, raycaster, mouse;
        let planets = [];
        let targetPos = new THREE.Vector3(0, 0, 15);

        const planetData = {
            "Sun": "The center of our solar system. A massive star that provides energy to all life.",
            "Mercury": "The smallest planet and closest to the Sun. It's fast and very hot!",
            "Venus": "Earth's twin, but with a thick toxic atmosphere that traps heat.",
            "Earth": "Our home. The only planet known to support life and liquid water.",
            "Mars": "The Red Planet. Home to the tallest volcano in the solar system.",
            "Jupiter": "The King of Planets. A gas giant with a Great Red Spot storm.",
            "Saturn": "Famous for its beautiful rings made of ice and rock dust.",
            "Uranus": "An ice giant that spins on its side. Very cold and mysterious.",
            "Neptune": "The farthest planet. It has the strongest winds in the solar system."
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lighting
            const light = new THREE.PointLight(0xffffff, 2, 100);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Create Planets
            createPlanet("Sun", 2, 0, 0xffff00);
            createPlanet("Mercury", 0.4, 4, 0xaaaaaa);
            createPlanet("Venus", 0.7, 6, 0xffcc00);
            createPlanet("Earth", 0.8, 8, 0x2277ff);
            createPlanet("Mars", 0.6, 10, 0xff4400);
            createPlanet("Jupiter", 1.5, 13, 0xd2b48c);
            createPlanet("Saturn", 1.3, 17, 0xead6b8);
            createPlanet("Uranus", 1, 20, 0x82edff);
            createPlanet("Neptune", 1, 23, 0x3f5efb);

            // Stars
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(3000 * 3);
            for(let i=0; i<9000; i++) starPos[i] = (Math.random() - 0.5) * 100;
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1})));

            window.addEventListener('click', onPlanetClick);
        }

        function createPlanet(name, size, dist, color) {
            const geo = new THREE.SphereGeometry(size, 32, 32);
            const mat = new THREE.MeshPhongMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.x = dist;
            mesh.userData = { name: name, description: planetData[name] };
            planets.push(mesh);
            scene.add(mesh);
        }

        function onPlanetClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);

            if (intersects.length > 0) {
                const p = intersects[0].object;
                document.getElementById('p-name').innerText = p.userData.name;
                document.getElementById('p-desc').innerText = p.userData.description;
                document.getElementById('info-panel').classList.add('active');
                
                // Cinematic Move: Camera planet ke paas jayegi
                targetPos.set(p.position.x, p.position.y, p.position.z + 3);
            }
        }

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
            targetPos.set(0, 0, 15); // Zoom out back to system
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Orbit Animations
            planets.forEach((p, i) => {
                if(p.userData.name !== "Sun") {
                    const speed = 0.01 / (i * 0.5);
                    const angle = Date.now() * speed;
                    const dist = i * 2.5 + 2;
                    p.position.x = Math.cos(angle) * dist;
                    p.position.z = Math.sin(angle) * dist;
                }
                p.rotation.y += 0.01;
            });

            // Smooth Camera Movement
            camera.position.lerp(targetPos, 0.05);
            
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
