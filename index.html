<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Shop | Abubakar's Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #00509d;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .fish-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h2 {
            border-bottom: 2px solid #00509d;
            padding-bottom: 10px;
            color: #00509d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #00509d;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>FISH SHOP</header>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1524704654690-b56c05c78a00?auto=format&fit=crop&w=800&q=80" alt="Fresh Fish" class="fish-image">
        
        <h2>Fresh Fish Price List</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Fish Name</th>
                    <th>Price (Per KG)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Rohu Fish</td>
                    <td>RS 450</td>
                </tr>
                <tr>
                    <td>Bangda (Mackerel)</td>
                    <td>RS 300</td>
                </tr>
                <tr>
                    <td>Surmai (King Fish)</td>
                    <td>RS 800</td>
                </tr>
                <tr>
                    <td>Pomfret</td>
                    <td>RS 1200</td>
                </tr>
                <tr>
                    <td>Prawns</td>
                    <td>RS 600</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        &copy; 2026 Fish Shop | Created for a Friend
    </div>

</body>
</html>
