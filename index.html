<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Masterpiece | Abubakar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        /* Deep Space Stars */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
        }

        #hud {
            position: fixed; top: 30px; left: 30px;
            color: white; border-left: 3px solid #00f2fe; padding-left: 15px;
        }

        .solar-system {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.6); /* Mobile fix */
        }

        /* The Sun */
        .sun {
            position: absolute;
            width: 80px; height: 80px;
            background: radial-gradient(circle, #ff0, #f90, #f00);
            border-radius: 50%;
            box-shadow: 0 0 50px #ffcc00;
        }

        /* Planets Base Style */
        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate linear infinite;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            top: -10px; /* Orbit ke upar bithane ke liye */
        }

        /* Individual Orbits & Planets */
        .mercury-orbit { width: 140px; height: 140px; animation-duration: 3s; }
        .mercury { width: 10px; height: 10px; background: #999; left: 50%; }

        .venus-orbit { width: 200px; height: 200px; animation-duration: 6s; }
        .venus { width: 18px; height: 18px; background: #e3bb76; }

        .earth-orbit { width: 280px; height: 280px; animation-duration: 10s; }
        .earth { 
            width: 22px; height: 22px; 
            background: radial-gradient(circle, #2277ff, #111);
            box-shadow: 0 0 10px #2277ff;
        }

        .mars-orbit { width: 360px; height: 360px; animation-duration: 15s; }
        .mars { width: 16px; height: 16px; background: #ff4400; }

        .jupiter-orbit { width: 500px; height: 500px; animation-duration: 30s; }
        .jupiter { width: 45px; height: 45px; background: #d39c7e; }

        .saturn-orbit { width: 650px; height: 650px; animation-duration: 50s; }
        .saturn { 
            width: 35px; height: 35px; background: #ead6b8; 
            border-bottom: 4px solid rgba(255,255,255,0.3); /* Ring effect */
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .solar-system { transform: scale(0.4); }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div id="hud">
        <h1 style="margin:0; color:white; letter-spacing:3px;">COSMOS ULTRA</h1>
        <p style="margin:0; color:#00f2fe; font-size:0.7rem;">STABLE VERSION | EXPLORER: ABUBAKAR</p>
    </div>

    <div class="solar-system">
        <div class="sun"></div>
        
        <div class="orbit mercury-orbit"><div class="planet mercury"></div></div>
        <div class="orbit venus-orbit"><div class="planet venus"></div></div>
        <div class="orbit earth-orbit"><div class="planet earth"></div></div>
        <div class="orbit mars-orbit"><div class="planet mars"></div></div>
        <div class="orbit jupiter-orbit"><div class="planet jupiter"></div></div>
        <div class="orbit saturn-orbit"><div class="planet saturn"></div></div>
    </div>

</body>
</html>
