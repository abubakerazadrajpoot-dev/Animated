<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fish Boutique</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* Deep Matte Black */
            color: #e0e0e0;
            font-family: 'Poppins', sans-serif;
        }

        header {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            border-bottom: 1px solid #c9a227; /* Gold Border */
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #c9a227; /* Luxury Gold */
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .main-content {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Professional Image Frame */
        .image-container {
            width: 100%;
            border: 1px solid #333;
            padding: 10px;
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        .image-container img {
            width: 100%;
            display: block;
            filter: grayscale(20%) contrast(110%);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #c9a227;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* Professional Table Design */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #111;
            border: 1px solid #222;
        }

        th {
            background: #1a1a1a;
            color: #c9a227;
            padding: 20px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #c9a227;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            font-size: 0.95rem;
        }

        tr:hover {
            background: #161616;
        }

        .price {
            font-weight: 600;
            color: #fff;
        }

        .footer {
            text-align: center;
            padding: 50px;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>FISH SHOP</h1>
    </header>

    <div class="main-content">
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1522069169874-c58ec4b76be5?auto=format&fit=crop&w=1200&q=80" alt="Exotic Fish">
        </div>

        <h2>EXCLUSIVE PRICE LIST</h2>

        <table>
            <thead>
                <tr>
                    <th>Variety</th>
                    <th>Premium Price</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Fresh Rohu</td>
                    <td class="price">RS 450.00</td>
                </tr>
                <tr>
                    <td>Mackerel (Bangda)</td>
                    <td class="price">RS 300.00</td>
                </tr>
                <tr>
                    <td>King Fish (Surmai)</td>
                    <td class="price">RS 850.00</td>
                </tr>
                <tr>
                    <td>White Pomfret</td>
                    <td class="price">RS 1200.00</td>
                </tr>
                <tr>
                    <td>Jumbo Prawns</td>
                    <td class="price">RS 650.00</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        ESTABLISHED 2026 | BUILT FOR ABUBAKAR'S LEGACY
    </div>

</body>
</html>
