<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abubakar Interstellar Masterpiece</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif;
        }

        /* Asli NASA Space Background (No-Load Error) */
        .universe {
            position: fixed; width: 100%; height: 100%;
            background: url('https://w0.peakpx.com/wallpaper/419/547/HD-wallpaper-outer-space-stars-nebula-galaxy.jpg') no-repeat center center;
            background-size: cover;
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        #hud {
            position: fixed; top: 40px; left: 40px; color: white;
            border-left: 4px solid #00f2fe; padding-left: 20px; z-index: 10;
        }

        .solar-system {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Realistic Sun with Corona Effect */
        .sun {
            width: 120px; height: 120px;
            background: radial-gradient(circle, #fff700 0%, #ff8800 50%, #ff4400 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffaa00, 0 0 120px rgba(255, 170, 0, 0.4);
            z-index: 5;
            animation: sunGlow 3s infinite alternate;
        }

        @keyframes sunGlow {
            from { transform: scale(1); box-shadow: 0 0 60px #ffaa00; }
            to { transform: scale(1.05); box-shadow: 0 0 100px #ffaa00; }
        }

        /* Realistic Earth Orbit */
        .earth-orbit {
            position: absolute;
            width: 350px; height: 350px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 50%;
            animation: rotate 15s linear infinite;
        }

        .earth {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 45px; height: 45px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png') no-repeat;
            background-size: contain;
            filter: drop-shadow(0 0 15px #2277ff);
        }

        /* Saturn with Rings */
        .saturn-orbit {
            position: absolute;
            width: 600px; height: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: rotate 40s linear infinite;
        }

        .saturn {
            position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 50px;
            background: url('https://pngimg.com/d/saturn_PNG1.png') no-repeat;
            background-size: contain;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating Info Labels */
        .label {
            position: absolute; color: #00f2fe; font-size: 0.6rem;
            letter-spacing: 2px; text-transform: uppercase;
            margin-top: 50px; width: 100px; text-align: center;
        }

    </style>
</head>
<body>

    <div class="universe"></div>

    <div id="hud">
        <h1 style="margin:0; letter-spacing:8px;">ABUBAKAR</h1>
        <p style="margin:0; font-size:0.7rem; color:#00f2fe;">COMMANDER | DEEP SPACE STATION 01</p>
    </div>

    <div class="solar-system">
        <div class="sun"></div>

        <div class="earth-orbit">
            <div class="earth">
                <div class="label" style="top:40px;">EARTH (HOME)</div>
            </div>
        </div>

        <div class="saturn-orbit">
            <div class="saturn">
                <div class="label" style="top:60px;">SATURN</div>
            </div>
        </div>
    </div>

</body>
</html>
