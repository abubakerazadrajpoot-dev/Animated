<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abubakar's 3D Earth Masterpiece</title>
    <style>
        /* 1. Google Font for Futuristic Look */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap');

        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }

        /* Welcome Overlay (Pehle Ye Dikhega) */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out, visibility 1s;
        }

        #welcome-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* Glitch Title Effect */
        .title {
            font-size: 8vw;
            color: #fff;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 15px;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), 
                         -0.025em -0.05em 0 rgba(0,255,0,.75), 
                         0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 1s infinite;
        }

        /* Enter Button Style */
        .start-btn {
            margin-top: 50px;
            padding: 20px 60px;
            font-size: 1.5rem;
            color: #fff;
            background: transparent;
            border: 2px solid #00f2fe;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        .start-btn:hover {
            background: #00f2fe;
            color: #000;
            box-shadow: 0 0 30px #00f2fe;
            transform: scale(1.1);
        }

        /* Main UI (Jo Earth Ke Upar Aayega) */
        #main-ui {
            position: fixed;
            top: 10%; left: 5%;
            color: white;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease-in 1s; /* Dheere se aayega */
        }

        #main-ui.visible { opacity: 1; }

        .subtitle { font-size: 1rem; opacity: 0.6; letter-spacing: 3px; }
        .main-title {
            font-size: 4rem; margin: 10px 0;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 8px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(0,255,0,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(0,0,255,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75); }
        }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <h1 class="title">ABUBAKAR</h1>
        <p style="color: #fff; opacity: 0.6; letter-spacing: 2px; margin-top: 20px;">Digital Earth Experience</p>
        <button class="start-btn" id="enter-btn">ENTER SYSTEM</button>
    </div>

    <div id="main-ui">
        <p class="subtitle">PROJECT STATUS: ACTIVE</p>
        <h1 class="main-title">3D EARTH</h1>
        <p class="subtitle">ORBITAL VIEW | KHAIRPUR NODE</p>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp4" type="audio/mp4">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, earth, clouds, stars;
        let isStarted = false;

        // Button Click Function
        document.getElementById('enter-btn').addEventListener('click', () => {
            // 1. Hide Welcome Screen
            document.getElementById('welcome-overlay').classList.add('hidden');
            // 2. Show Main UI
            document.getElementById('main-ui').classList.add('visible');
            // 3. Play Music (if exists)
            const music = document.getElementById('bg-music');
            music.play().catch(error => console.log("Music play blocked by browser."));
            
            // 4. Trigger Earth Entry Animation
            isStarted = true;
        });

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6; // Start far away (Welcome view)

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. Earth Setup
            const loader = new THREE.TextureLoader();
            const earthTexture = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
            const earthNormal = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
            
            const earthGeo = new THREE.SphereGeometry(1, 64, 64);
            const earthMat = new THREE.MeshPhongMaterial({ map: earthTexture, normalMap: earthNormal, shininess: 10 });
            earth = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earth);

            // 3. Clouds Setup
            const cloudGeo = new THREE.SphereGeometry(1.015, 64, 64);
            const cloudMat = new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true, opacity: 0.8
            });
            clouds = new THREE.Mesh(cloudGeo, cloudMat);
            scene.add(clouds);

            // 4. Stars Background
            const starGeo = new THREE.BufferGeometry();
            const starCount = 8000;
            const starPos = new Float32Array(starCount * 3);
            for(let i=0; i<starCount*3; i++) { starPos[i] = (Math.random() - 0.5) * 150; }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // 5. Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 2.5);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(5, 3, 5);
            scene.add(sunLight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Constant rotation
            earth.rotation.y += 0.0015;
            clouds.rotation.y += 0.0025;
            stars.rotation.y -= 0.0001; // subtle star movement

            // Smooth camera zoom-in after click
            if (isStarted && camera.position.z > 2.2) {
                camera.position.z -= 0.05; // Adjust zoom speed here
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
