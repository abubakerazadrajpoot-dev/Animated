<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abubakar Interstellar | Final Masterpiece</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #hud {
            position: fixed; top: 30px; left: 30px; color: white;
            border-left: 2px solid #00f2fe; padding-left: 15px; z-index: 10;
            pointer-events: none;
        }
        .name { font-size: 1.5rem; letter-spacing: 5px; font-weight: 900; color: #fff; }
        .status { font-size: 0.6rem; color: #00f2fe; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="name">ABUBAKAR</div>
        <div class="status">Commander | Deep Space Station Genesis</div>
    </div>

    <canvas id="universe"></canvas>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');

        let w, h;
        const stars = [];
        const planets = [
            { name: "Mercury", dist: 60, size: 4, speed: 0.04, color: "#888", angle: 0 },
            { name: "Venus", dist: 90, size: 7, speed: 0.02, color: "#e3bb76", angle: 0 },
            { name: "Earth", dist: 130, size: 8, speed: 0.015, color: "#2277ff", angle: 0 },
            { name: "Mars", dist: 170, size: 6, speed: 0.01, color: "#ff4400", angle: 0 },
            { name: "Jupiter", dist: 230, size: 15, speed: 0.005, color: "#d39c7e", angle: 0 }
        ];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            
            // Generate 400 unique stars
            for(let i=0; i<400; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    blink: Math.random() * 0.02
                });
            }
        }

        function draw() {
            // Dark Space Background
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, w, h);

            // Draw Stars (Twinkling)
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.opacity += s.blink;
                if(s.opacity > 1 || s.opacity < 0) s.blink *= -1;
            });

            const cx = w / 2;
            const cy = h / 2;

            // Draw Sun (Glowing)
            const sunGlow = ctx.createRadialGradient(cx, cy, 5, cx, cy, 40);
            sunGlow.addColorStop(0, "#fff700");
            sunGlow.addColorStop(0.5, "#ff8800");
            sunGlow.addColorStop(1, "rgba(255, 68, 0, 0)");
            
            ctx.fillStyle = sunGlow;
            ctx.beginPath();
            ctx.arc(cx, cy, 40, 0, Math.PI * 2);
            ctx.fill();

            // Draw Orbits & Planets
            planets.forEach(p => {
                // Orbit path
                ctx.strokeStyle = "rgba(0, 242, 254, 0.1)";
                ctx.beginPath();
                ctx.arc(cx, cy, p.dist, 0, Math.PI * 2);
                ctx.stroke();

                // Planet position
                const px = cx + Math.cos(p.angle) * p.dist;
                const py = cy + Math.sin(p.angle) * p.dist;

                // Planet Shadow/Glow
                const pGlow = ctx.createRadialGradient(px, py, 0, px, py, p.size * 2);
                pGlow.addColorStop(0, p.color);
                pGlow.addColorStop(1, "rgba(0,0,0,0)");

                ctx.fillStyle = pGlow;
                ctx.beginPath();
                ctx.arc(px, py, p.size * 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(px, py, p.size, 0, Math.PI * 2);
                ctx.fill();

                p.angle += p.speed;
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
