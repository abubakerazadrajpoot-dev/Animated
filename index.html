<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abubakar | Ultimate Solar Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;700&display=swap');
        
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; color: white; }
        canvas { display: block; }

        /* Cinematic HUD */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            border: 20px solid rgba(0, 242, 254, 0.05); box-sizing: border-box;
        }

        #header {
            position: absolute; top: 40px; left: 40px;
            border-left: 3px solid #00f2fe; padding-left: 20px;
        }

        .title { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; letter-spacing: 8px; font-weight: 900; }
        .sub { font-size: 0.7rem; color: #00f2fe; letter-spacing: 3px; text-transform: uppercase; }

        /* Info Box */
        #data-stream {
            position: absolute; bottom: 40px; right: 40px;
            text-align: right; font-family: monospace; color: rgba(0, 242, 254, 0.7);
            font-size: 0.6rem; line-height: 1.5;
        }

        /* Loading Screen */
        #boot-sequence {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; flex-direction: column; transition: 1.5s ease-in-out;
        }
        .scanline { width: 200px; height: 2px; background: #00f2fe; box-shadow: 0 0 15px #00f2fe; animation: scan 2s infinite; }
        @keyframes scan { 0% { transform: scaleX(0); } 50% { transform: scaleX(1); } 100% { transform: scaleX(0); } }
    </style>
</head>
<body>

    <div id="boot-sequence">
        <div class="scanline"></div>
        <p style="letter-spacing: 5px; margin-top: 20px;">CALIBRATING INTERSTELLAR CORE...</p>
    </div>

    <div id="ui-layer">
        <div id="header">
            <div class="title">ABUBAKAR</div>
            <div class="sub">Deep Space Simulation v9.0</div>
        </div>
        <div id="data-stream">
            COORDINATES: 27.29° N, 68.48° E<br>
            ENGINE: MANUAL CANVAS RENDERER<br>
            STATUS: HYPER-REALISTIC ALPHA
        </div>
    </div>

    <canvas id="cosmos"></canvas>

    <script>
        const canvas = document.getElementById('cosmos');
        const ctx = canvas.getContext('2d');
        let w, h;

        // --- Manual Physics & Data ---
        const universe = {
            stars: [],
            nebula: [],
            planets: [
                { name: "MERCURY", d: 70, size: 3.5, s: 0.04, c: "#A5A5A5", info: "Fastest Orbit", angle: Math.random()*6 },
                { name: "VENUS", d: 110, size: 7.5, s: 0.015, c: "#E3BB76", info: "Hottest Planet", angle: Math.random()*6 },
                { name: "EARTH", d: 160, size: 8.5, s: 0.01, c: "#2277FF", info: "Life Sustaining", angle: Math.random()*6 },
                { name: "MARS", d: 210, size: 6.5, s: 0.008, c: "#FF4400", info: "The Red Desert", angle: Math.random()*6 },
                { name: "JUPITER", d: 290, size: 18, s: 0.004, c: "#D39C7E", info: "King of Giants", angle: Math.random()*6 },
                { name: "SATURN", d: 380, size: 15, s: 0.002, c: "#EAD6B8", info: "Lord of Rings", ring: true, angle: Math.random()*6 }
            ]
        };

        function setup() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;

            // Generate 600 unique stars with depth
            for(let i=0; i<600; i++) {
                universe.stars.push({
                    x: Math.random() * w, y: Math.random() * h,
                    z: Math.random() * 2, o: Math.random(),
                    b: Math.random() * 0.02
                });
            }
            
            // Generate Nebula Clouds
            for(let i=0; i<5; i++) {
                universe.nebula.push({
                    x: Math.random() * w, y: Math.random() * h,
                    r: 200 + Math.random() * 400,
                    c: i % 2 === 0 ? 'rgba(0, 100, 255, 0.03)' : 'rgba(255, 50, 0, 0.02)'
                });
            }
        }

        function drawPlanet(p, cx, cy) {
            const x = cx + Math.cos(p.angle) * p.d;
            const y = cy + Math.sin(p.angle) * p.d;

            // 1. Draw Orbit Ring (Futuristic)
            ctx.strokeStyle = "rgba(0, 242, 254, 0.08)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(cx, cy, p.d, 0, Math.PI * 2);
            ctx.stroke();

            // 2. Realistic 3D Sphere Shadow (Direct GPU-style Painting)
            // Light source is at (cx, cy) - the Sun
            const grad = ctx.createRadialGradient(x, y, 0, x, y, p.size * 1.5);
            grad.addColorStop(0, p.c);
            grad.addColorStop(0.4, p.c);
            grad.addColorStop(1, 'rgba(0,0,0,0.9)'); // Deep space shadow

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, p.size * 1.5, 0, Math.PI * 2);
            ctx.fill();

            // 3. Saturn's Ring (Manual Detail)
            if(p.ring) {
                ctx.strokeStyle = "rgba(234, 214, 184, 0.4)";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.ellipse(x, y, p.size * 2.5, p.size * 0.8, p.angle, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 4. Label Text (Cinematic)
            ctx.fillStyle = "rgba(0, 242, 254, 0.6)";
            ctx.font = "bold 8px Orbitron";
            ctx.fillText(p.name, x + p.size + 5, y);
            
            p.angle += p.s;
        }

        function render() {
            // Fill Background with slight trail for motion blur
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, w, h);

            // Draw Nebula (Soft Atmosphere)
            universe.nebula.forEach(n => {
                const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
                g.addColorStop(0, n.c);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
            });

            // Draw Stars
            universe.stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.z, 0, Math.PI * 2);
                ctx.fill();
                s.o += s.b;
                if(s.o > 1 || s.o < 0) s.b *= -1;
            });

            const cx = w / 2;
            const cy = h / 2;

            // The Sun - Volumetric Masterpiece
            const sunGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
            sunGlow.addColorStop(0, "#FFF");
            sunGlow.addColorStop(0.2, "#FFD700");
            sunGlow.addColorStop(0.5, "rgba(255, 68, 0, 0.3)");
            sunGlow.addColorStop(1, "transparent");

            ctx.fillStyle = sunGlow;
            ctx.beginPath();
            ctx.arc(cx, cy, 80, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#FFCC00";
            ctx.beginPath();
            ctx.arc(cx, cy, 35, 0, Math.PI * 2);
            ctx.fill();

            // Render All Planets
            universe.planets.forEach(p => drawPlanet(p, cx, cy));

            requestAnimationFrame(render);
        }

        // Boot sequence
        window.addEventListener('load', () => {
            setup();
            setTimeout(() => {
                document.getElementById('boot-sequence').style.opacity = '0';
                setTimeout(() => document.getElementById('boot-sequence').remove(), 1500);
            }, 2000);
            render();
        });

        window.addEventListener('resize', setup);
    </script>
</body>
</html>
