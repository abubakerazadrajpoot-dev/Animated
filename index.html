<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | ABUBAKAR_ROOT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Matrix Rain Background */
        #matrix-bg {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.15;
        }

        /* Terminal UI Layer */
        #terminal {
            position: relative;
            z-index: 10;
            padding: 30px;
            height: 100vh;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            display: flex;
            flex-direction: column;
        }

        .header {
            border-bottom: 2px solid #0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            animation: flicker 0.1s infinite;
        }

        .console-output {
            flex-grow: 1;
            overflow: hidden;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .line { margin-bottom: 5px; }
        .success { color: #0f0; font-weight: bold; }
        .danger { color: #f00; font-weight: bold; text-shadow: 0 0 10px #f00; }
        .warning { color: #ff0; }

        /* Hacker Scanner Box */
        .scanner {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 250px;
            border: 1px solid #0f0;
            padding: 15px;
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            border: 1px solid #0f0;
            margin-top: 10px;
            position: relative;
        }

        #fill {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: 0.1s;
        }

        @keyframes flicker {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #0f0;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div id="terminal">
        <div class="header">
            <span>SYSTEM: ABUBAKAR_EXPLOIT_V7</span>
            <span>ENCRYPTION: AES-256</span>
        </div>

        <div class="console-output" id="output">
            </div>

        <div class="line">
            <span class="success">root@abubakar:~#</span> <span id="typing"></span><span class="cursor"></span>
        </div>
    </div>

    <div class="scanner">
        <div style="font-size: 0.7rem;">OVERRIDING SECURITY...</div>
        <div class="progress-bar"><div id="fill"></div></div>
        <div id="percent" style="font-size: 0.8rem; margin-top: 5px;">0%</div>
    </div>

    <script>
        // --- Matrix Rain Logic ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, i) => {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }

        // --- Terminal Logs ---
        const output = document.getElementById('output');
        const logs = [
            "INITIALIZING BYPASS SEQUENCE...",
            "CONNECTING TO REMOTE SERVER [192.168.1.254]",
            "HANDSHAKE ESTABLISHED...",
            "BRUTE-FORCING ROOT ACCESS...",
            "WARNING: FIREWALL DETECTED",
            "INJECTING SQL PAYLOAD...",
            "BYPASSING KERNEL RESTRICTIONS...",
            "ACCESS GRANTED",
            "EXTRACTING ENCRYPTED DATA...",
            "DOWNLOADING DATABASE..."
        ];

        let logIndex = 0;
        function addLog() {
            if (logIndex < logs.length) {
                const line = document.createElement('div');
                line.className = 'line';
                if (logs[logIndex].includes('WARNING')) line.className += ' warning';
                if (logs[logIndex].includes('GRANTED')) line.className += ' success';
                
                line.innerHTML = `[${new Date().toLocaleTimeString()}] ${logs[logIndex]}`;
                output.appendChild(line);
                logIndex++;
                setTimeout(addLog, 800);
            }
        }

        // --- Progress Bar ---
        let width = 0;
        function updateScanner() {
            if (width < 100) {
                width += Math.random() * 2;
                if (width > 100) width = 100;
                document.getElementById('fill').style.width = width + '%';
                document.getElementById('percent').innerText = Math.floor(width) + '%';
                setTimeout(updateScanner, 100);
            } else {
                document.getElementById('percent').innerText = "SYSTEM COMPROMISED";
                document.getElementById('percent').className = "danger";
            }
        }

        setInterval(drawMatrix, 50);
        addLog();
        updateScanner();
    </script>
</body>
</html>
