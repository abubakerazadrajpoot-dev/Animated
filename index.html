<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Abubakar Cosmos | Masterpiece</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Unbounded', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Space Background */
        .space-bg {
            position: fixed;
            width: 200%; height: 200%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            animation: spaceMove 100s linear infinite;
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes spaceMove {
            from { transform: translate(-25%, -25%) rotate(0deg); }
            to { transform: translate(0%, 0%) rotate(5deg); }
        }

        /* HUD UI - Futuristic */
        #interface {
            position: fixed; top: 40px; left: 40px;
            color: #fff; z-index: 100;
            border-left: 2px solid #00f2fe; padding-left: 20px;
        }
        .user-tag { font-size: 0.6rem; letter-spacing: 5px; color: #00f2fe; text-transform: uppercase; }
        .site-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }

        /* The Solar System Container */
        .system {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
            transform: rotateX(20deg); /* 3D Perspective Tilt */
        }

        /* The Sun - Real Glow */
        .sun {
            position: absolute;
            width: 100px; height: 100px;
            background: #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 100px #ff6600, 0 0 200px rgba(255, 150, 0, 0.4);
            filter: blur(1px);
        }

        /* Planet Orbit & Sphere Logic */
        .orbit {
            position: absolute;
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            animation: orbitRotation linear infinite;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            top: 50%; left: -15px;
            transform: translateY(-50%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.8), 0 0 15px rgba(255,255,255,0.2);
        }

        /* Planet Specifics */
        .p-earth { 
            width: 30px; height: 30px; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover;
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.5);
        }
        .o-earth { width: 350px; height: 350px; animation-duration: 20s; }

        .p-mars { 
            width: 22px; height: 22px; 
            background: radial-gradient(circle at 30% 30%, #ff4400, #441100);
            box-shadow: 0 0 15px rgba(255, 68, 0, 0.4);
        }
        .o-mars { width: 480px; height: 480px; animation-duration: 35s; }

        .p-jupiter {
            width: 60px; height: 60px;
            background: repeating-linear-gradient(#d39c7e, #af8362 10%, #d39c7e 20%);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .o-jupiter { width: 650px; height: 650px; animation-duration: 60s; }

        @keyframes orbitRotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Pulse Animation for Glow */
        .sun-pulse {
            position: absolute;
            width: 100%; height: 100%;
            background: inherit;
            border-radius: inherit;
            animation: pulse 4s ease-out infinite;
            opacity: 0.5;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <div id="interface">
        <p class="user-tag">Identity: Abubakar</p>
        <h1 class="site-title">COSMOS MASTERPIECE</h1>
        <p style="font-size: 0.5rem; opacity: 0.5; margin-top: 5px;">STATION: KHAIRPUR NODE-01</p>
    </div>

    <div class="system">
        <div class="sun">
            <div class="sun-pulse"></div>
        </div>

        <div class="orbit o-earth">
            <div class="planet p-earth"></div>
        </div>

        <div class="orbit o-mars">
            <div class="planet p-mars"></div>
        </div>

        <div class="orbit o-jupiter">
            <div class="planet p-jupiter"></div>
        </div>
    </div>

</body>
</html>
